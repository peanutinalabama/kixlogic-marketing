# Kixlogic Marketing — Decap CMS
# Admin UI: https://kixlogic.com/admin/
#
# Production login requires a GitHub OAuth proxy (one-time setup).
# Local editing: run `npm run cms` then open http://localhost:4321/admin/

backend:
  name: github
  repo: peanutinalabama/kixlogic-marketing
  branch: main
  base_url: https://cms-auth.kixlogic.com
  auth_endpoint: auth

# Uncomment for local editing with `npm run cms`:
# local_backend: true

media_folder: public/images/uploads
public_folder: /images/uploads

logo_url: /Kixlogo-light.png

publish_mode: editorial_workflow

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: pubDate, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Author, name: author, widget: string, default: "Kixlogic Team" }
      - label: Tags
        name: tags
        widget: list
        default: []
        field: { label: Tag, name: tag, widget: string }
      - { label: Featured Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }
