# Kixlogic Marketing — Decap CMS
# Admin UI: https://kixlogic.com/admin/
#
# Production login requires a GitHub OAuth proxy (one-time setup).
# Local editing: run `npm run cms` then open http://localhost:4321/admin/

backend:
  name: github
  repo: peanutinalabama/kixlogic-marketing
  branch: main
  # After OAuth proxy is deployed, uncomment and set your proxy URL:
  # base_url: https://YOUR_OAUTH_PROXY.example.com
  # auth_endpoint: auth

# Uncomment for local editing with `npm run cms`:
# local_backend: true

media_folder: public/images/uploads
public_folder: /images/uploads

logo_url: /Kixlogo-dark.png

publish_mode: editorial_workflow

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: pubDate, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Author, name: author, widget: string, default: "Kixlogic Team" }
      - label: Tags
        name: tags
        widget: list
        default: []
        field: { label: Tag, name: tag, widget: string }
      - { label: Featured Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: site
    label: Site Content
    files:
      - name: promo
        label: Promo Banner
        file: src/data/site.json
        fields:
          - label: Promo Banner
            name: promoBanner
            widget: object
            fields:
              - { label: Show banner, name: enabled, widget: boolean, default: true }
              - { label: Banner text, name: text, widget: string }
              - { label: Link label, name: linkLabel, widget: string }
              - { label: Link URL, name: linkHref, widget: string }

      - name: homepage
        label: Homepage (drag sections to reorder)
        file: src/data/homepage.json
        fields:
          - label: SEO
            name: seo
            widget: object
            fields:
              - { label: Page title, name: title, widget: string }
              - { label: Meta description, name: description, widget: text }
          - label: Greeting
            name: greeting
            widget: object
            fields:
              - { label: Headline, name: headline, widget: string }
              - { label: Subheadline, name: subheadline, widget: string }
              - label: Action buttons
                name: buttons
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: URL, name: href, widget: string }
          - label: Page sections
            name: sections
            widget: list
            summary: "{{fields.type}} — {{fields.title}}"
            fields:
              - label: Section type
                name: type
                widget: select
                options:
                  - { label: Hero banner, value: hero }
                  - { label: Quick nav icons, value: quicknav }
                  - { label: Product cards (4-col), value: products }
                  - { label: Feature banner, value: feature }
                  - { label: AI cards (3-col), value: ai }
                  - { label: Why Kixlogic (3-col), value: why }
              - { label: Enabled, name: enabled, widget: boolean, default: true }
              - { label: Section heading, name: heading, widget: string, required: false }
              - { label: Title, name: title, widget: string, required: false }
              - { label: Description, name: description, widget: text, required: false }
              - { label: Image, name: image, widget: image, required: false }
              - { label: CTA label, name: ctaLabel, widget: string, required: false }
              - { label: CTA URL, name: ctaHref, widget: string, required: false }
              - label: CTA checkout plan
                name: ctaCheckout
                widget: select
                required: false
                options: ["", starter, growth, professional]
              - { label: Grey background, name: greyBackground, widget: boolean, default: false, required: false }
              - label: Quick nav items
                name: items
                widget: list
                required: false
                fields:
                  - { label: Icon (emoji), name: icon, widget: string }
                  - { label: Label, name: label, widget: string }
                  - { label: URL, name: href, widget: string }
              - label: Cards
                name: cards
                widget: list
                required: false
                fields:
                  - { label: Title, name: title, widget: string }
                  - { label: Description, name: description, widget: text }
                  - { label: Image, name: image, widget: image, required: false }
                  - { label: URL, name: href, widget: string, required: false }
                  - { label: CTA label, name: cta, widget: string, required: false }
                  - { label: Coming soon badge, name: soon, widget: boolean, default: false }
