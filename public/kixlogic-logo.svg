<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 96" fill="none">
  <!-- Network icon: left-pointing triangle of 3 nodes -->
  <g fill="currentColor" stroke="currentColor">
    <!-- Connecting lines -->
    <line x1="18" y1="48" x2="58" y2="18" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="18" y1="48" x2="58" y2="78" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="58" y1="18" x2="58" y2="78" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Nodes -->
    <circle cx="18" cy="48" r="9"/>
    <circle cx="58" cy="18" r="9"/>
    <circle cx="58" cy="78" r="9"/>
  </g>
  <!-- Wordmark -->
  <text
    x="82"
    y="66"
    font-family="Inter, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56"
    font-weight="600"
    letter-spacing="-0.5"
    fill="currentColor"
  >Kixlogic</text>
</svg>
